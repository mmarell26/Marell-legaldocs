<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marell LegalDocs | Document Preparation Services</title>
  <meta name="description" content="Professional document preparation services. Not a law firm. No legal advice. Fast, accurate, court-ready formatting." />
  <style>
    :root{
      --bg:#0b0c10;
      --card:#12131a;
      --text:#f2f4f8;
      --muted:#b9c0d0;
      --line:#23263a;
      --accent:#d8b36a; /* gold */
      --btn:#1b1f2e;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, "Helvetica Neue", sans-serif;
      background: radial-gradient(1200px 600px at 20% 0%, #1a1d2a 0%, var(--bg) 60%);
      color:var(--text);
      line-height:1.5;
    }
    a{color:inherit}
    .wrap{max-width:1100px;margin:0 auto;padding:28px 18px 70px}
    header{
      display:flex;align-items:center;justify-content:space-between;gap:14px;
      padding:14px 0 22px;border-bottom:1px solid var(--line);
    }
    .brand{display:flex;align-items:center;gap:10px}
    .logo{
      width:40px;height:40px;border-radius:10px;
      background: linear-gradient(145deg, #2a2f45, #131626);
      border:1px solid var(--line);
      display:flex;align-items:center;justify-content:center;
      font-weight:800;color:var(--accent);letter-spacing:.5px;
    }
    .brand h1{font-size:16px;margin:0;letter-spacing:.3px}
    .brand p{margin:0;font-size:12px;color:var(--muted)}
    nav{display:flex;gap:10px;flex-wrap:wrap}
    .pill{
      padding:9px 12px;border:1px solid var(--line);border-radius:999px;
      font-size:13px;color:var(--muted);text-decoration:none;
      background: rgba(18,19,26,.4);
    }
    .pill:hover{border-color:#3a3f66;color:var(--text)}
    .hero{
      padding:34px 0 18px;
      display:grid;grid-template-columns:1.25fr .75fr;gap:18px;
    }
    .hero h2{margin:0 0 10px;font-size:40px;line-height:1.15}
    .hero p{margin:0 0 18px;color:var(--muted);font-size:16px;max-width:60ch}
    .cta{display:flex;gap:10px;flex-wrap:wrap}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      padding:12px 14px;border-radius:12px;text-decoration:none;
      border:1px solid var(--line);background:var(--btn);color:var(--text);
      font-weight:600;font-size:14px;
    }
    .btn.primary{
      background: linear-gradient(145deg, #2a2f45, #14182a);
      border-color:#3a3f66;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .btn.primary span{color:var(--accent)}
    .card{
      background: rgba(18,19,26,.7);
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
    }
    .kpi{display:grid;gap:10px}
    .kpi div{border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(0,0,0,.18)}
    .kpi b{display:block;font-size:13px}
    .kpi small{color:var(--muted)}
    section{margin-top:18px}
    h3{margin:0 0 10px;font-size:18px}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .service h4{margin:0 0 6px;font-size:15px}
    .service p{margin:0;color:var(--muted);font-size:13px}
    .price{margin-top:10px;font-weight:700}
    .price span{color:var(--accent)}
    .note{color:var(--muted);font-size:13px;margin-top:8px}
    .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    footer{
      margin-top:26px;padding-top:16px;border-top:1px solid var(--line);
      color:var(--muted);font-size:12px
    }

      background: rgba(216,179,106,.08);
      border:1px solid rgba(216,179,106,.25);
      color: #f4e7c8;
      border-radius:14px;
      padding:14px;
